name: tests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install test dependencies (no Composer)
        run: |
          mkdir -p vendor/10up vendor/mockery vendor/antecedent vendor/hamcrest
          git clone --depth 1 --branch 0.5.0 https://github.com/10up/wp_mock.git vendor/10up/wp_mock
          git clone --depth 1 --branch 1.6.12 https://github.com/mockery/mockery.git vendor/mockery/mockery
          git clone --depth 1 --branch 2.1.27 https://github.com/antecedent/patchwork.git vendor/antecedent/patchwork
          git clone --depth 1 https://github.com/hamcrest/hamcrest-php.git vendor/hamcrest/hamcrest-php
      - name: PHP syntax lint
        run: find . -path ./vendor -prune -o -name '*.php' -print | xargs -I{} php -l {} | grep -v "No syntax errors" || echo "Lint OK"
      - name: PHPUnit
        run: phpunit -c phpunit.xml

  integration:
    name: BDD integration (WordPress + MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_test
        ports: [ '3306:3306' ]
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli
          tools: composer:v2, wp-cli
      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Install WP test suite
        run: bash bin/install-wp-tests.sh wp_test root root 127.0.0.1 latest
      - name: Install test dependencies
        run: |
          mkdir -p vendor/10up vendor/mockery vendor/antecedent vendor/hamcrest
          git clone --depth 1 --branch 0.5.0 https://github.com/10up/wp_mock.git vendor/10up/wp_mock
          git clone --depth 1 --branch 1.6.12 https://github.com/mockery/mockery.git vendor/mockery/mockery
          git clone --depth 1 --branch 2.1.27 https://github.com/antecedent/patchwork.git vendor/antecedent/patchwork
          git clone --depth 1 https://github.com/hamcrest/hamcrest-php.git vendor/hamcrest/hamcrest-php
      - name: Run BDD test suite
        run: phpunit -c phpunit-integration.xml
