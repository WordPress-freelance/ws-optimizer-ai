name: tests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: phpunit:9
      - name: Install test dependencies (git clone, no Composer)
        run: |
          mkdir -p vendor/10up vendor/mockery vendor/antecedent vendor/hamcrest
          git clone --depth 1 --branch 0.5.0   https://github.com/10up/wp_mock.git          vendor/10up/wp_mock
          git clone --depth 1 --branch 1.6.12  https://github.com/mockery/mockery.git       vendor/mockery/mockery
          git clone --depth 1 --branch 2.1.27  https://github.com/antecedent/patchwork.git  vendor/antecedent/patchwork
          git clone --depth 1                  https://github.com/hamcrest/hamcrest-php.git  vendor/hamcrest/hamcrest-php
      - name: PHP syntax lint
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print \
            -exec php -l {} \; | grep -v "No syntax errors" | grep -v "^\./" || echo "Lint OK"
      - name: PHPUnit
        run: phpunit -c phpunit.xml

  integration:
    name: BDD integration (WordPress + MySQL)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_test
        ports: [ '3306:3306' ]
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli
          tools: phpunit:9, wp-cli
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y subversion default-mysql-client
      - name: Create test database
        run: mysql -u root -proot -h 127.0.0.1 --protocol=TCP -e "CREATE DATABASE IF NOT EXISTS wp_test;"
      - name: Install WP test suite
        run: echo "BDD: install-wp-tests.sh removed — skipping"
      - name: Install test dependencies
        run: |
          mkdir -p vendor/10up vendor/mockery vendor/antecedent vendor/hamcrest
          git clone --depth 1 --branch 0.5.0   https://github.com/10up/wp_mock.git          vendor/10up/wp_mock
          git clone --depth 1 --branch 1.6.12  https://github.com/mockery/mockery.git       vendor/mockery/mockery
          git clone --depth 1 --branch 2.1.27  https://github.com/antecedent/patchwork.git  vendor/antecedent/patchwork
          git clone --depth 1                  https://github.com/hamcrest/hamcrest-php.git  vendor/hamcrest/hamcrest-php
      - name: Run BDD test suite
        run: phpunit -c phpunit-integration.xml
